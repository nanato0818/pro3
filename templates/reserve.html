{% extends "base.html" %}
{% block title %}予約 - トレーニングルーム予約{% endblock %}
{% block content %}
<h1>{{ target_date.strftime('%Y年%m月%d日') }} の予約</h1>

{% if remaining_text %}
<p class="remaining-note">今週の残り予約可能時間: <strong>{{ remaining_text }}</strong></p>
{% endif %}

<form method="post" class="form-card">
    <div class="time-slot-row">
        <div>
            <label for="start_time">開始時刻</label>
            <select name="start_time" id="start_time" required>
                <option value="" disabled {% if not form.get('start_time') %}selected{% endif %}>選択してください</option>
                {% for t in time_slots %}
                <option value="{{ t }}" {% if form.get('start_time') == t %}selected{% endif %}>{{ t }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label for="end_time">終了時刻</label>
            <select name="end_time" id="end_time" required>
                <option value="" disabled {% if not form.get('end_time') %}selected{% endif %}>選択してください</option>
                {% for t in time_slots %}
                <option value="{{ t }}" {% if form.get('end_time') == t %}selected{% endif %}>{{ t }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <button type="submit" class="btn btn-primary btn-large">予約する</button>
    <a href="{{ url_for('home') }}" class="btn btn-secondary">戻る</a>
</form>
{% endblock %}
